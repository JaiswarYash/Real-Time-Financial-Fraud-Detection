versoion: "3.12"

services:
    api:
      build:
        context: .
        dockerfile: dockerfile
      container_name: fraud_prediction_api
      ports:
        - "8000:8000"
      volumes:
            - ./models:/app/models # model updates without rebuild
      envirnoment:
          - MODEL_PATH = artifacts/model.pkl
      healthcheck:
          test: ["CMD", "curl", "-f", "http://localhost:8000/"]
          interval: 30s
          timeout: 10s
          retries: 3

    streamlit:
        build:
            context: .
            dockerfile: Dockerfile.streamlit
        container_name: streamlit_application
        ports:
            - "8501:8501"
        depends_on:
            - api  # waits for API to start first
        environment:
            - API_URL=http://api:8000  # use service name, not localhost
    